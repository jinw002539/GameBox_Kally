<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <title>Snake Pro - Desafio Infinito</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg-color: #1a1a2e;
            --snake-head: #60CBFF;
            --snake-body: #34495e;
            --food-color: #FF003D;
            --accent: #ffce00;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #E3F2FD;
            font-family: 'Open Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* Container do Jogo */
        .wrapper {
            width: 100vmin;
            max-width: 500px;
            background: #293447;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
        }

        .game-details {
            color: #B8C6DC;
            font-weight: 600;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
        }

        .play-board {
            height: 350px;
            width: 100%;
            display: grid;
            background: #212837;
            grid-template: repeat(30, 1fr) / repeat(30, 1fr);
        }

        .play-board .food { background: var(--food-color); border-radius: 50%; box-shadow: 0 0 10px var(--food-color); }
        .play-board .head { background: var(--snake-head); border-radius: 4px; z-index: 2; }
        .play-board .body-part { background: var(--snake-body); border-radius: 2px; }

        /* Controles Estilo D-Pad para Telemóvel */
        .controls {
            padding: 20px;
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            justify-content: center;
            gap: 10px;
            background: #171B26;
        }

        .controls i {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #B8C6DC;
            background: #293447;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0 #111;
        }

        .controls i:active { transform: translateY(4px); box-shadow: none; }
        .controls i[data-key="ArrowUp"] { grid-area: up; }
        .controls i[data-key="ArrowDown"] { grid-area: down; }
        .controls i[data-key="ArrowLeft"] { grid-area: left; }
        .controls i[data-key="ArrowRight"] { grid-area: right; }

        /* Telas de Overlay */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 46, 0.95);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            color: white;
            width: 100%;
        }

        .title-main { font-family: 'Bungee', cursive; color: var(--accent); font-size: 2rem; }

        .rules-list {
            text-align: left;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 0.9rem;
        }
        .rules-list li { list-style: none; margin-bottom: 8px; }
        .rules-list li::before { content: "🐍 "; }

        .btn-start {
            font-family: 'Bungee';
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            width: 100%;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div id="start-screen" class="overlay">
            <div class="glass-card shadow-lg">
                <h1 class="title-main mb-3">SNAKE PRO</h1>
                <div class="rules-list">
                    <li>Usa as setas para guiar a cobra.</li>
                    <li>Come as frutas vermelhas para crescer.</li>
                    <li>Não batas nas paredes nem no teu corpo.</li>
                    <li>Cada fruta aumenta a tua pontuação!</li>
                </div>
                <button class="btn-start shadow" onclick="startGame()">INICIAR JOGO</button>
            </div>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <div class="glass-card">
                <h2 class="title-main mb-3">GAME OVER</h2>
                <p class="mb-4">O teu recorde foi guardado!</p>
                <button class="btn-start" onclick="location.reload()">TENTAR DE NOVO</button>
            </div>
        </div>

        <div class="game-details">
            <span class="score">Pontos: 0</span>
            <span class="high-score">Recorde: 0</span>
        </div>

        <div class="play-board"></div>

        <div class="controls">
            <i data-key="ArrowUp" class="fa-solid fa-arrow-up"></i>
            <i data-key="ArrowLeft" class="fa-solid fa-arrow-left"></i>
            <i data-key="ArrowRight" class="fa-solid fa-arrow-right"></i>
            <i data-key="ArrowDown" class="fa-solid fa-arrow-down"></i>
        </div>
    </div>

    <script>
        const playBoard = document.querySelector(".play-board");
        const scoreElement = document.querySelector(".score");
        const highScoreElement = document.querySelector(".high-score");
        const controls = document.querySelectorAll(".controls i");

        let gameOver = false;
        let foodX, foodY;
        let snakeX = 5, snakeY = 5;
        let velocityX = 0, velocityY = 0;
        let snakeBody = [];
        let setIntervalId;
        let score = 0;
        let gameStarted = false;

        let highScore = localStorage.getItem("high-score-snake") || 0;
        highScoreElement.innerText = `Recorde: ${highScore}`;

        const updateFoodPosition = () => {
            foodX = Math.floor(Math.random() * 30) + 1;
            foodY = Math.floor(Math.random() * 30) + 1;
        }

        const handleGameOver = () => {
            clearInterval(setIntervalId);
            document.getElementById("game-over-screen").classList.remove("hidden");
        }

        // Efeito especial ao começar
        function startGame() {
            gsap.to("#start-screen .glass-card", {
                scale: 2,
                opacity: 0,
                duration: 0.5,
                ease: "power2.in",
                onComplete: () => {
                    document.getElementById("start-screen").classList.add("hidden");
                    gameStarted = true;
                    updateFoodPosition();
                    setIntervalId = setInterval(initGame, 100);
                }
            });
            // Brilho no tabuleiro ao iniciar
            gsap.fromTo(".play-board", { boxShadow: "0 0 0px var(--accent)" }, { boxShadow: "0 0 30px var(--accent)", duration: 0.3, yoyo: true, repeat: 1 });
        }

        const changeDirection = e => {
            if(!gameStarted) return;
            if(e.key === "ArrowUp" && velocityY != 1) { velocityX = 0; velocityY = -1; }
            else if(e.key === "ArrowDown" && velocityY != -1) { velocityX = 0; velocityY = 1; }
            else if(e.key === "ArrowLeft" && velocityX != 1) { velocityX = -1; velocityY = 0; }
            else if(e.key === "ArrowRight" && velocityX != -1) { velocityX = 1; velocityY = 0; }
        }

        controls.forEach(button => button.addEventListener("click", () => changeDirection({ key: button.dataset.key })));

        const initGame = () => {
            if(gameOver) return handleGameOver();
            
            let html = `<div class="food" style="grid-area: ${foodY} / ${foodX}"></div>`;

            if(snakeX === foodX && snakeY === foodY) {
                updateFoodPosition();
                snakeBody.push([foodY, foodX]);
                score++;
                highScore = score >= highScore ? score : highScore;
                localStorage.setItem("high-score-snake", highScore);
                scoreElement.innerText = `Pontos: ${score}`;
                highScoreElement.innerText = `Recorde: ${highScore}`;
            }

            for (let i = snakeBody.length - 1; i > 0; i--) {
                snakeBody[i] = snakeBody[i - 1];
            }

            snakeX += velocityX;
            snakeY += velocityY;
            snakeBody[0] = [snakeX, snakeY];

            if(snakeX <= 0 || snakeX > 30 || snakeY <= 0 || snakeY > 30) {
                return gameOver = true;
            }

            for (let i = 0; i < snakeBody.length; i++) {
                let className = i === 0 ? "head" : "body-part";
                html += `<div class="${className}" style="grid-area: ${snakeBody[i][1]} / ${snakeBody[i][0]}"></div>`;
                if (i !== 0 && snakeBody[0][1] === snakeBody[i][1] && snakeBody[0][0] === snakeBody[i][0]) {
                    gameOver = true;
                }
            }
            playBoard.innerHTML = html;
        }

        document.addEventListener("keyup", changeDirection);
    </script>
</body>
</html>
