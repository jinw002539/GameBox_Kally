<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://quge5.com/88/tag.min.js" data-zone="213157" async data-cfasync="false"></script>
    <meta name="monetag" content="9e9b6e6bd2d0351ee9abd27124ab6535">
    <title>Simon Says Pro</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #1a1a2e;
        color: white;
        text-align: center;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      /* --- TELA INICIAL (NOVA) --- */
      #start-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(26, 26, 46, 0.95);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        transition: opacity 0.5s ease-in-out;
      }

      .menu-content {
        background: #16213e;
        padding: 40px;
        border-radius: 20px;
        border: 2px solid #0f3460;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }

      .menu-content h1 {
        font-size: 3.5rem;
        color: #e94560;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .menu-content p {
        font-size: 1.2rem;
        margin-bottom: 30px;
        color: #b8b8b8;
      }

      .menu-btn {
        display: block;
        width: 200px;
        margin: 15px auto;
        padding: 15px;
        font-size: 1.2rem;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        font-weight: bold;
      }

      #start-btn {
        background-color: #0f3460;
        color: white;
      }

      #start-btn:hover { background-color: #e94560; }

      #rules-btn {
        background-color: transparent;
        border: 2px solid #e94560;
        color: #e94560;
      }

      #rules-btn:hover {
        background-color: #e94560;
        color: white;
      }

      /* --- MODAL DE REGRAS (NOVO) --- */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.8);
        z-index: 2000;
      }

      .modal-content {
        background: white;
        color: #333;
        width: 90%;
        max-width: 500px;
        margin: 10% auto;
        padding: 30px;
        border-radius: 15px;
        position: relative;
        text-align: left;
      }

      .modal-content h2 { color: #e94560; margin-bottom: 15px; text-align: center; }
      .modal-content p { margin-bottom: 10px; line-height: 1.5; }

      .close-modal {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 2rem;
        cursor: pointer;
      }

      /* --- JOGO (ATUALIZADO) --- */
      h1.game-title {
        font-size: 2rem;
        margin-bottom: 20px;
        color: #e94560;
      }

      #game-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-bottom: 30px;
        width: 320px;
        height: 320px;
      }

      .color-btn {
        width: 100%;
        height: 100%;
        border-radius: 20px;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        transition: transform 0.1s, filter 0.1s;
      }

      /* Cores mais vivas */
      #green { background-color: #00ff00; border: 4px solid #006600; }
      #red { background-color: #ff0000; border: 4px solid #660000; }
      #yellow { background-color: #ffff00; border: 4px solid #666600; }
      #blue { background-color: #0000ff; border: 4px solid #000066; }

      .color-btn.active {
        transform: scale(1.05);
        filter: brightness(1.5);
      }

      #game-status {
        margin-top: 10px;
        font-size: 1.1rem;
        background: rgba(0,0,0,0.2);
        padding: 15px;
        border-radius: 10px;
        width: 320px;
      }

      .my-text {
        font-size: 1.2rem;
        margin-top: 10px;
        opacity: 0;
        transition: opacity 0.5s;
        display: none;
      }
      .my-text.show { opacity: 1; display: block; }

      /* Esconde o botão original, pois usamos o da tela inicial */
      #start-btn-original { display: none; }

      #level-message {
        font-size: 24px;
        font-weight: bold;
        color: #00ff00;
        margin-top: 20px;
        opacity: 0;
        transition: opacity 0.5s;
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.8);
        padding: 20px;
        border-radius: 10px;
      }
      #level-message.show { opacity: 1; display: block; }

      /* --- RESPONSIVIDADE --- */
      @media (max-width: 400px) {
        #game-container { width: 280px; height: 280px; gap: 15px; }
        .menu-content h1 { font-size: 2.5rem; }
        .modal-content { margin: 20% auto; }
      }
    </style>
  </head>
  <body>

    <div id="start-screen">
      <div class="menu-content">
        <h1>Simon</h1>
        <p>Color Memory Game</p>
        <button class="menu-btn" id="start-btn">Começar</button>
        <button class="menu-btn" id="rules-btn">Regras</button>
      </div>
    </div>

    <div id="rules-modal" class="modal">
      <div class="modal-content">
        <span class="close-modal" id="close-rules">&times;</span>
        <h2>Regras</h2>
        <p>1. Observe a sequência de cores que pisca.</p>
        <p>2. Clique nas cores na mesma ordem.</p>
        <p>3. A sequência aumenta a cada nível!</p>
      </div>
    </div>

    <h1 class="game-title">Simon Says</h1>
    <div id="game-container">
      <div class="color-btn" id="green"></div>
      <div class="color-btn" id="red"></div>
      <div class="color-btn" id="yellow"></div>
      <div class="color-btn" id="blue"></div>
    </div>

    <div id="game-status">
      <p class="my-text" id="sequence">
        Sequência: <span id="sequence-display">-</span>
      </p>
      <p class="my-text" id="clicks">
        Cliques: <span id="click-count">0</span>
      </p>
      <p class="my-text" id="status-text">
        Status: <span id="status">Aguardando...</span>
      </p>
    </div>
    
    <p id="level-message"></p>

    <script>
      const colors = ["green", "red", "yellow", "blue"];
      let gamePattern = [];
      let userPattern = [];
      let level = 0;
      let clickCount = 0;
      let gameStarted = false;

      // Elementos
      const startScreen = document.getElementById("start-screen");
      const rulesModal = document.getElementById("rules-modal");

      // Event Listeners para UI
      document.getElementById("start-btn").addEventListener("click", startGame);
      document.getElementById("rules-btn").addEventListener("click", () => rulesModal.style.display = "block");
      document.getElementById("close-rules").addEventListener("click", () => rulesModal.style.display = "none");
      window.onclick = (event) => { if (event.target == rulesModal) rulesModal.style.display = "none"; }

      function startGame() {
        if (!gameStarted) {
          gameStarted = true;
          level = 0;
          gamePattern = [];
          userPattern = [];
          clickCount = 0;
          
          // Esconde tela inicial
          startScreen.style.opacity = "0";
          setTimeout(() => startScreen.style.display = "none", 500);

          document.getElementById("status").textContent = `Nível ${level}`;
          document.getElementById("click-count").textContent = clickCount;

          showMyTexts();
          nextSequence();
        }
      }

      function nextSequence() {
        userPattern = [];
        clickCount = 0;
        document.getElementById("click-count").textContent = clickCount;
        level++;
        document.getElementById("status").textContent = `Nível ${level}`;

        document.getElementById("sequence-display").textContent = "-";

        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        gamePattern.push(randomColor);

        animateSequence();
      }

      function animateSequence() {
        let i = 0;
        const interval = setInterval(() => {
          flashButton(gamePattern[i]);
          i++;
          if (i === gamePattern.length) {
            clearInterval(interval);
            enableUserInput();
          }
        }, 600);
      }

      function flashButton(color) {
        const button = document.getElementById(color);
        button.classList.add("active");
        setTimeout(() => {
          button.classList.remove("active");
        }, 300);
      }

      function enableUserInput() {
        colors.forEach((color) => {
          document.getElementById(color).addEventListener("click", handleUserClick);
        });
      }

      function disableUserInput() {
        colors.forEach((color) => {
          document
            .getElementById(color)
            .removeEventListener("click", handleUserClick);
        });
      }

      function handleUserClick(event) {
        const clickedColor = event.target.id;
        userPattern.push(clickedColor);
        flashButton(clickedColor);
        clickCount++;
        document.getElementById("click-count").textContent = clickCount;

        const sequenceDisplay = document.getElementById("sequence-display");
        sequenceDisplay.innerHTML = "";

        userPattern.forEach((color) => {
          const span = document.createElement("span");
          span.style.color = color === "yellow" ? "#ffcc00" : color;
          span.textContent = color.toUpperCase() + " ";
          sequenceDisplay.appendChild(span);
        });

        checkAnswer(userPattern.length - 1);
      }

      function checkAnswer(currentLevel) {
        if (userPattern[currentLevel] === gamePattern[currentLevel]) {
          if (userPattern.length === gamePattern.length) {
            disableUserInput();
            setTimeout(() => {
              showCongratsMessage();
              setTimeout(() => {
                hideCongratsMessage();
                nextSequence();
              }, 1500);
            }, 500);
          }
        } else {
          document.getElementById("status").textContent = `Game Over!`;
          showLoseMessage();
          disableUserInput();
          
          setTimeout(() => {
            hideLoseMessage();
            hideMyTexts();
            // Volta para tela inicial
            startScreen.style.display = "flex";
            startScreen.style.opacity = "1";
            gameStarted = false;
            level = 0;
            document.getElementById("sequence-display").textContent = "-";
            document.getElementById("click-count").textContent = 0;
          }, 2500);
        }
      }

      function showCongratsMessage() {
        const message = `Nível ${level} Passado!`;
        const congratsMessageElement = document.getElementById("level-message");
        congratsMessageElement.textContent = message;
        congratsMessageElement.style.color = "#00ff00";
        congratsMessageElement.classList.add("show");
      }

      function hideCongratsMessage() {
        document.getElementById("level-message").classList.remove("show");
      }

      function showLoseMessage() {
        const message = `Fim de Jogo!`;
        const loseMessageElement = document.getElementById("level-message");
        loseMessageElement.textContent = message;
        loseMessageElement.style.color = "#ff0000";
        loseMessageElement.classList.add("show");
      }

      function hideLoseMessage() {
        document.getElementById("level-message").classList.remove("show");
      }

      function showMyTexts() {
        const texts = document.getElementsByClassName("my-text");
        for (let i = 0; i < texts.length; i++) {
          texts[i].classList.add("show");
        }
      }

      function hideMyTexts() {
        const texts = document.getElementsByClassName("my-text");
        for (let i = 0; i < texts.length; i++) {
          texts[i].classList.remove("show");
        }
      }

         document.addEventListener('contextmenu', event => event.preventDefault());

        // Impede atalhos de teclado (F12, Ctrl+Shift+I, Ctrl+U)
        document.onkeydown = function(e) {
            if (e.keyCode == 123 ||
                (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) ||
                (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
                return false;
            }
        };
    </script>
  </body>
</html>
